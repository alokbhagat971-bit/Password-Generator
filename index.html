<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="pass-container">
                <h1>
                PASSWORD GENERATOR &#128274
            </h1>
            <input type="text" id="pass-output" placeholder="PASSWORD" readonly>
            <div class="pass-input">
                
                <label class="len">
                Password Length
                <span id="pass-length">
                    12
                </span>
            </label>
            <input type="range" max="18" min="6" value="12" id="input-pass" oninput="update_length()">
                
                <button id="pass-btn" onclick="gen_pass()">
                GENERATE PASSWORD &#128273
            </button>
            <h2>
                Tell me the number — I summon the password.
            </h2>
            </div>  
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
